version: "3.9"

services:
  backend:
    build: ./backend
    container_name: docmind-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/chroma_data:/app/chroma_data

  frontend:
    build: ./frontend
    container_name: docmind-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend